<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dan's RBI Baseball 2026 Gameplay</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #07131b; font-family: "Segoe UI", Arial, sans-serif; }
    #game { display: block; width: 100%; height: 100%; }
    #hud { position: fixed; inset: 0; pointer-events: none; color: #fff; text-shadow: 0 2px 3px #000; }
    .panel { background: linear-gradient(180deg, rgba(17,54,85,.96), rgba(7,29,52,.96)); border: 2px solid rgba(203,222,239,.75); box-shadow: 0 3px 10px rgba(0,0,0,.55); }
    #score { position: absolute; left: 18px; top: 16px; min-width: 240px; padding: 10px 14px; display: grid; grid-template-columns: 1fr auto auto; gap: 4px 15px; font-weight: 700; }
    #score.custom { min-width: 310px; border-color: var(--board-accent, #cbe0ef); color: var(--board-text, #fff); text-shadow: 0 2px 3px #000; }
    .board-only { display: none; grid-column: 1 / -1; }
    #score.custom .board-only { display: block; }
    #boardIdentity { padding-bottom: 5px; border-bottom: 1px solid var(--board-accent, #cbe0ef); font-size: 12px; text-transform: uppercase; }
    #boardLogo { display: none; width: 26px; height: 26px; margin-right: 7px; object-fit: contain; vertical-align: middle; filter: drop-shadow(0 1px 1px #000); }
    #boardLogo.visible { display: inline-block; }
    #boardAd { margin: 5px -14px -10px; padding: 4px 10px; background: var(--board-ad, #161616); text-align: center; font-size: 10px; letter-spacing: 0; }
    #pitch { position: absolute; left: 50%; top: 16px; transform: translateX(-50%); min-width: 330px; padding: 9px 18px; text-align: center; }
    #pitch strong { display: block; font-size: 18px; }
    #pitch span { color: #d7e7f5; font-size: 12px; text-transform: uppercase; }
    #inning { position: absolute; right: 20px; top: 16px; width: 94px; height: 94px; }
    #diamond { position: absolute; width: 55px; height: 55px; left: 19px; top: 18px; transform: rotate(45deg); background: rgba(8,29,49,.92); border: 3px solid #d5e0e9; }
    .base { position: absolute; width: 13px; height: 13px; background: #53606b; border: 1px solid white; }
    .base.on { background: #f2d342; box-shadow: 0 0 8px #f2d342; }
    #b1 { right: -8px; top: 21px; } #b2 { left: 21px; top: -8px; } #b3 { left: -8px; top: 21px; }
    #inningText { position: absolute; width: 100%; bottom: 2px; text-align: center; font-weight: 800; font-size: 13px; }
    #count { position: absolute; left: 18px; bottom: 18px; padding: 8px 14px; font-size: 14px; font-weight: 700; }
    #venue { position: absolute; left: 18px; bottom: 59px; max-width: 340px; padding: 5px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    #result { position: absolute; right: 18px; bottom: 18px; min-width: 250px; padding: 9px 15px; text-align: right; font-weight: 700; }
    #fallback { display: none; position: fixed; inset: 0; place-items: center; color: white; background: #07131b; font-size: 20px; }
    @media (max-width: 900px) {
      #score { left: 10px; top: 10px; min-width: 190px; padding: 8px 10px; gap: 3px 10px; }
      #score.custom { min-width: 235px; max-width: calc(100% - 105px); }
      #boardAd { margin: 4px -10px -8px; }
      #pitch { top: 10px; min-width: 250px; padding: 7px 12px; }
      #pitch strong { font-size: 16px; }
      #inning { right: 10px; top: 10px; width: 82px; height: 82px; }
      #diamond { width: 46px; height: 46px; left: 17px; top: 15px; }
      #b1 { right: -7px; top: 17px; } #b2 { left: 17px; top: -7px; } #b3 { left: -7px; top: 17px; }
      #count { left: 10px; bottom: 10px; }
      #venue { left: 10px; bottom: 49px; max-width: 250px; }
      #result { right: 10px; bottom: 10px; min-width: 220px; }
    }
    @media (max-width: 620px) {
      #pitch { top: 100px; width: calc(100% - 16px); min-width: 0; }
      #score.custom + #pitch { top: 130px; }
      #score.custom { min-width: 0; width: calc(100% - 105px); }
      #venue { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="3D baseball gameplay"></canvas>
  <div id="hud">
    <div id="score" class="panel">
      <span id="awayName">AWAY</span><span id="awayRuns">0</span><span>R</span>
      <span id="homeName">HOME</span><span id="homeRuns">0</span><span>R</span>
      <span id="boardIdentity" class="board-only"><img id="boardLogo" alt=""><span id="boardIdentityText"></span></span>
      <span id="boardAd" class="board-only"></span>
    </div>
    <div id="pitch" class="panel"><strong id="pitchName">FASTBALL</strong><span id="matchup">Pitcher vs Batter</span></div>
    <div id="inning" class="panel">
      <div id="diamond"><i id="b1" class="base"></i><i id="b2" class="base"></i><i id="b3" class="base"></i></div>
      <div id="inningText">TOP 1</div>
    </div>
    <div id="count" class="panel">B 0 &nbsp; S 0 &nbsp; O 0</div>
    <div id="venue" class="panel">BASEBALL FIELD</div>
    <div id="result" class="panel">READY</div>
  </div>
  <div id="fallback">3D renderer unavailable</div>
  <script type="importmap">
    {
      "imports": {
        "three": "./three.module.min.js",
        "three/addons/": "./addons/"
      }
    }
  </script>
  <script type="module" src="./gameplay3d.js"></script>
</body>
</html>
